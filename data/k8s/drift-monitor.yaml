apiVersion: batch/v1
kind: CronJob
metadata:
  name: drift-monitor
  namespace: data
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: drift-monitor
            image: ghcr.io/skullmag/mlops-project-drift-monitor:latest
            env:
            - name: APP_CRED_SECRET
              valueFrom:
                secretKeyRef:
                  name: swift-credentials
                  key: app_cred_secret
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
          restartPolicy: OnFailure
