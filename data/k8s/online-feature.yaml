apiVersion: apps/v1
kind: Deployment
metadata:
  name: online-feature
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: online-feature
  template:
    metadata:
      labels:
        app: online-feature
    spec:
      containers:
      - name: online-feature
        image: ghcr.io/skullmag/mlops-project-online-feature:latest
        ports:
        - containerPort: 8000
        env:
        - name: APP_CRED_SECRET
          valueFrom:
            secretKeyRef:
              name: swift-credentials
              key: app_cred_secret
---
apiVersion: v1
kind: Service
metadata:
  name: online-feature-svc
  namespace: data
spec:
  selector:
    app: online-feature
  ports:
  - port: 8000
    targetPort: 8000
