apiVersion: batch/v1
kind: Job
metadata:
  name: data-ingestion
  namespace: data
spec:
  template:
    spec:
      containers:
      - name: data-ingestion
        image: ghcr.io/skullmag/mlops-project-data-ingestion:latest
        env:
        - name: APP_CRED_SECRET
          valueFrom:
            secretKeyRef:
              name: swift-credentials
              key: app_cred_secret
      restartPolicy: Never
  backoffLimit: 3
