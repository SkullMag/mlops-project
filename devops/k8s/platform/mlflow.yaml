# MLflow — model registry and experiment tracker
# Metadata stored in PostgreSQL, artifacts stored in MinIO.
# Both use PVCs so state persists across pod restarts.

# ── PostgreSQL for MLflow metadata ────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-postgres-pvc
  namespace: immich-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-postgres
  namespace: immich-platform
  labels:
    app: mlflow-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-postgres
  template:
    metadata:
      labels:
        app: mlflow-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: mlflow
            - name: POSTGRES_USER
              value: mlflow
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-postgres-credentials
                  key: password
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "mlflow", "-d", "mlflow"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: mlflow-postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-postgres
  namespace: immich-platform
spec:
  selector:
    app: mlflow-postgres
  ports:
    - port: 5432
      targetPort: 5432

---
# ── MLflow tracking server ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: immich-platform
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.35
          command:
            - sh
            - -c
            - until nc -z mlflow-postgres 5432; do echo "waiting for postgres..."; sleep 3; done
        - name: wait-for-minio
          image: busybox:1.35
          command:
            - sh
            - -c
            - until nc -z minio.immich-platform.svc.cluster.local 9000; do echo "waiting for minio..."; sleep 3; done
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.11.3
          ports:
            - containerPort: 8000
          command:
            - mlflow
            - server
            - --host=0.0.0.0
            - --port=8000
            - --backend-store-uri=postgresql://mlflow:$(MLFLOW_DB_PASSWORD)@mlflow-postgres:5432/mlflow
            - --default-artifact-root=s3://mlflow-artifacts/
            - --serve-artifacts
          env:
            - name: MLFLOW_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-postgres-credentials
                  key: password
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: accesskey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secretkey
            - name: MLFLOW_S3_ENDPOINT_URL
              value: http://minio.immich-platform.svc.cluster.local:9000
            - name: AWS_DEFAULT_REGION
              value: us-east-1
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: immich-platform
spec:
  selector:
    app: mlflow
  type: ClusterIP
  # externalIPs patched at deploy time by Ansible
  ports:
    - port: 8000
      targetPort: 8000
