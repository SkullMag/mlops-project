# Immich Server — main REST API and web UI
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: immich
  labels:
    app: immich-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-server
  template:
    metadata:
      labels:
        app: immich-server
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.35
          command:
            - sh
            - -c
            - until nc -z immich-postgres 5432; do echo "waiting for postgres..."; sleep 3; done
        - name: wait-for-redis
          image: busybox:1.35
          command:
            - sh
            - -c
            - until nc -z immich-redis 6379; do echo "waiting for redis..."; sleep 3; done
      containers:
        - name: immich-server
          image: ghcr.io/immich-app/immich-server:release
          ports:
            - containerPort: 3001
          env:
            - name: DB_HOSTNAME
              value: immich-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE_NAME
              value: immich
            - name: DB_USERNAME
              value: immich
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-secrets
                  key: db-password
            - name: REDIS_HOSTNAME
              value: immich-redis
            - name: REDIS_PORT
              value: "6379"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: immich-secrets
                  key: jwt-secret
            - name: UPLOAD_LOCATION
              value: /usr/src/app/upload
            - name: IMMICH_MACHINE_LEARNING_URL
              value: http://immich-machine-learning:3003
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          volumeMounts:
            - name: upload-data
              mountPath: /usr/src/app/upload
          readinessProbe:
            httpGet:
              path: /api/server-info/ping
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: upload-data
          persistentVolumeClaim:
            claimName: immich-upload-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: immich-server
  namespace: immich
spec:
  selector:
    app: immich-server
  type: ClusterIP
  # externalIPs patched at deploy time by Ansible using node1's real IP
  ports:
    - name: http
      port: 2283
      targetPort: 3001
