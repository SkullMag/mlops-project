# This top-level 'immich' key maps to the dependency name in your Chart.yaml
immich:
  image:
    tag: v1.118.2

  # 1. Environment Variables for the sub-chart
  env:
    IMMICH_MACHINE_LEARNING_URL: "http://immich-tagger.immich-production.svc.cluster.local:8080"
    DB_HOSTNAME: immich-postgresql
    DB_USERNAME: postgres
    DB_DATABASE_NAME: immich
    REDIS_HOSTNAME: immich-redis-master

  # 2. Persistence: This is the specific block causing the 'checks.yaml' failure.
  # We must provide 'existingClaim' as an empty string to satisfy the check.
  persistence:
    library:
      enabled: true
      size: 20Gi
      accessMode: ReadWriteOnce
      existingClaim: "" 

  # 3. Component Configuration
  machine-learning:
    enabled: false

  postgresql:
    enabled: true
    global:
      postgresql:
        auth:
          existingSecret: immich-postgres-credentials
          secretKeys:
            userPasswordKey: password

  redis:
    enabled: true
    architecture: standalone
    auth:
      enabled: false

  # 4. Server Networking
  server:
    enabled: true
    service:
      main:
        ports:
          http:
            port: 3000