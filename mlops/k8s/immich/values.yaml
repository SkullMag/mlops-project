# Values for the Immich upstream Helm chart.
# Reference: https://github.com/immich-app/immich-charts/blob/main/charts/immich/values.yaml
#
# Our team's ML tagging feature runs in the immich-staging / immich-canary /
# immich-production namespaces alongside Immich. The integration between Immich
# and our ML serving endpoint is done at the application layer (by the
# serving + data team members); DevOps's job is to make sure Immich runs
# reliably in Kubernetes with persistent storage for photos + database.

immich:
  image:
    tag: v1.118.2

  # The 'env' section in this chart often expects simple key/values.
  # If you use valueFrom, ensure it is indented correctly under the key.
  env:
    IMMICH_MACHINE_LEARNING_URL: "http://immich-tagger.immich-production.svc.cluster.local:8080"
    DB_HOSTNAME: immich-postgresql
    DB_USERNAME: postgres
    DB_DATABASE_NAME: immich
    REDIS_HOSTNAME: immich-redis-master
    # Remove DB_PASSWORD from here if the chart pulls it from the postgresql block below

  machine-learning:
    enabled: false

  postgresql:
    enabled: true
    global:
      postgresql:
        auth:
          existingSecret: immich-postgres-credentials
          secretKeys:
            userPasswordKey: password

  redis:
    enabled: true
    architecture: standalone
    auth:
      enabled: false

  server:
    enabled: true # Ensure the server component is actually enabled
    service:
      main: # The 'common' library requires a named service (usually 'main')
        ports:
          http:
            port: 3000

  persistence:
    library:
      enabled: true
      size: 20Gi
      accessMode: ReadWriteOnce