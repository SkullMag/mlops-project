# Top level: This configures the main Immich chart
immich:
  persistence:
    library:
      enabled: true
      size: 20Gi
      accessMode: ReadWriteOnce
      existingClaim: ""  # Leave this as an empty string

# These are sub-charts and should be at the TOP LEVEL (no indentation)
postgresql:
  enabled: true
  global:
    postgresql:
      auth:
        existingSecret: immich-postgres-credentials
        secretKeys:
          userPasswordKey: password

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false

# This tells the server component to use the library defined above
server:
  enabled: true
  persistence:
    library:
      enabled: true