immich:
  persistence:
    library:
      enabled: true
      size: 20Gi
      accessMode: ReadWriteOnce
      existingClaim: "immich-library"

postgresql:
  enabled: true
  global:
    postgresql:
      auth:
        existingSecret: immich-postgres-credentials
        secretKeys:
          userPasswordKey: password

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false

server:
  enabled: true
  persistence:
    library:
      enabled: true