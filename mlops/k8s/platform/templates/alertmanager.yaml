---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: immich-platform
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: 'null'  # default: drop everything
      group_by: ['alertname']
      routes:
        # Alerts labeled action=rollback are forwarded to the Argo Events webhook,
        # which triggers the rollback-production workflow.
        - matchers:
            - action = "rollback"
          receiver: 'rollback-webhook'
          group_wait: 0s
          repeat_interval: 1h
    receivers:
      - name: 'null'
      - name: 'rollback-webhook'
        webhook_configs:
          - url: 'http://rollback-webhook-eventsource-svc.argo-events.svc.cluster.local:12000/rollback'
            send_resolved: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: immich-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
          ports:
            - containerPort: 9093
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: storage
              mountPath: /alertmanager
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: immich-platform
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
