---
# Default deny in each serving namespace: pods can only receive traffic from
# explicitly allowed sources. This limits blast radius if a serving pod is
# compromised.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: immich-staging
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-platform-and-immich
  namespace: immich-staging
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: immich-platform
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: immich
        # Allow incoming from same namespace (pod-to-pod)
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: immich-canary
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-platform-and-immich
  namespace: immich-canary
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: immich-platform
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: immich
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: immich-production
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-platform-and-immich
  namespace: immich-production
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: immich-platform
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: immich
        - podSelector: {}
---
# Resource quota: prevents runaway pods from starving the cluster.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: immich-production
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "12"
    limits.memory: "20Gi"
    pods: "20"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: immich-canary
spec:
  hard:
    requests.cpu: "2"
    requests.memory: "4Gi"
    limits.cpu: "4"
    limits.memory: "8Gi"
    pods: "10"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: immich-staging
spec:
  hard:
    requests.cpu: "2"
    requests.memory: "4Gi"
    limits.cpu: "4"
    limits.memory: "8Gi"
    pods: "10"
