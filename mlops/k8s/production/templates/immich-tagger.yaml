# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-tagger
  namespace: immich-production
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: immich-tagger
  template:
    metadata:
      labels:
        app: immich-tagger
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: immich-tagger
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports:
            - containerPort: 8000
          env:
            - name: ENV_NAME
              value: "production"
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow.immich-platform.svc.cluster.local:8000"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: immich-tagger
  namespace: immich-production
spec:
  selector:
    app: immich-tagger
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
  externalIPs:
    - {{ .Values.service.externalIP }}
---
# ReferenceGrant allows HTTPRoute in immich-platform to reference this Service
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-platform-httproute
  namespace: immich-production
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: immich-platform
  to:
  - group: ""
    kind: Service
{{- if .Values.autoscaling.enabled }}
---
# HorizontalPodAutoscaler: scale production based on CPU utilization
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: immich-tagger-hpa
  namespace: immich-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: immich-tagger
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
{{- end }}

