replicaCount: 2

image:
  repository: registry.kube-system.svc.cluster.local:5000/immich-tagger
  tag: production-1.0.0

service:
  port: 8080
  externalIP: ""   # Placeholder

resources:
  limits:
    cpu: "2000m"
    memory: "2Gi"
  requests:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
